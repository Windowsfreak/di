<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream Improvisation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body class="dark-theme">
    <div id="app" class="app-container show-genres">
        <!-- Horizontal Sidebar / Vertical Top Area -->
        <aside id="sidebar" class="sidebar">
            <header class="sidebar-header">
                <h1 class="app-title">Dream Improvisation</h1>
            </header>

            <div id="genre-view" class="genre-view">
                <header class="section-header">
                    <h2>Genres</h2>
                </header>
                <div id="genre-list" class="genre-list"></div>
            </div>
            
            <!-- In Horizontal view, controls are inside the sidebar -->
            <div id="desktop-controls-placeholder"></div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-view" class="main-view">
            <div id="playlist-view" class="playlist-view">
                <div id="playlist-container" class="playlist-container"></div>
            </div>
        </main>

        <!-- Shared Playback Controls -->
        <section id="controls" class="playback-controls">
            <div class="track-info-mini">
                <span id="current-track-name">Select a Genre...</span>
                <span id="current-genre-name"></span>
            </div>
            
            <div class="progress-container">
                <span id="current-time" class="time">0:00</span>
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="total-time" class="time">0:00</span>
            </div>

            <div class="control-buttons">
                <div class="main-btns">
                    <button id="prev-btn" class="btn-icon" aria-label="Previous Track">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    </button>
                    <button id="play-pause-btn" class="btn-icon btn-primary" aria-label="Play/Pause">
                        <svg id="play-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                        <svg id="pause-icon" class="hidden" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="next-btn" class="btn-icon" aria-label="Next Track">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>

                <div class="volume-container">
                    <svg class="volume-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM3 9v6h4l5 5V4L7 9H3z"/></svg>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>

                <div class="secondary-btns">
                    <div id="ratings-placeholder" class="ratings-container" title="Ratings (Coming Soon)">
                        <span class="active">★</span><span class="active">★</span><span class="active">★</span><span>★</span><span>★</span>
                    </div>
                    <button id="sleep-timer-btn" class="btn-text styled" aria-label="Sleep Timer">Sleep Timer</button>
                    <button id="genre-toggle" class="btn-text styled visible-mobile" aria-label="Toggle Genre List">Genres</button>
                </div>
            </div>

            <footer class="attribution">
                <p>All songs generated by a free version of <a href="https://suno.com" target="_blank" rel="noopener">Suno.com</a>. This is a non-profit project.</p>
            </footer>
        </section>

        <div id="sleep-timer-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Sleep Timer</h3>
                <div class="timer-slider-container">
                    <div id="selected-timer-display" class="timer-display">0:15</div>
                    <input type="range" id="timer-slider" min="0" max="48" step="1" value="14">
                    <div class="slider-labels">
                        <span>1m</span>
                        <span>4h</span>
                    </div>
                </div>
                <div class="timer-actions">
                    <label class="timer-checkbox-container">
                        <input type="checkbox" id="finish-track-checkbox">
                        <span>Finish last track</span>
                    </label>
                    <button id="start-timer-btn" class="btn-primary-rect">Start Timer</button>
                    <button id="cancel-timer" class="btn-text danger">Turn Off</button>
                </div>
            </div>
        </div>

    </div>
    
    <script src="app.js" type="module"></script>
</body>
</html>
